name: dnschat
description: 'Send messages to other devices on the local network.'
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.12.0

dependencies:
  async: ^2.13.1
  flutter:
    sdk: flutter
  get_storage: ^2.1.1
  intl: ^0.20.3
  network_info_plus: ^8.2.0
  nsd: ^5.0.1
  oktoast: ^3.4.0
  uuid: ^4.5.3
  web_socket: ^1.0.1

dev_dependencies:
  change_app_package_name: ^1.5.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
